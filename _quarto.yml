project:
  type: website
  render:
    - "*.ipynb"

format:
  html:
    toc: true
    toc-depth: 5
    css: styles.css
    page-layout: full
    code-block-bg: true
    code-overflow: wrap
    code-line-numbers: false
    monofont: D2Coding
    language:
      crossref-tbl-title: "표"
    mermaid:
      theme: neutral
    filters:
      - clean-code.lua

bibliography: references.bib
reference-location: margin

website:
  title: "Rust Book"
  site-url: https://rustbook.madebykim.kr/
  sidebar:
    style: "docked"
    search: true
    contents:
      - "index.ipynb"
      - section: "개발환경"
        contents:
          - "devenv/install.ipynb"
          - "devenv/hello.ipynb"
          - "devenv/debugging.ipynb"
      - section: "러스트 문법"
        contents:
          - "lang/datatype.ipynb"
          - "lang/variable.ipynb"
          - "lang/function.ipynb"
          - "lang/ownership.ipynb"
          - "lang/struct.ipynb"
          - "lang/collection.ipynb"
          - "lang/enum.ipynb"
          - "lang/reference.ipynb"
          - "lang/slice.ipynb"
          - "lang/string.ipynb"
